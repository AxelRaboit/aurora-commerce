framework:
    messenger:
        failure_transport: failed

        transports:
            # `async` is REQUIRED by modules that route long jobs (e.g.
            # aurora-billing OCR). Each module declares its own routing via its
            # bundle's prependExtension — you only provide the transport.
            async: '%env(MESSENGER_TRANSPORT_DSN)%'
            sync: 'sync://'
            failed: 'doctrine://default?queue_name=failed'
            scheduler_main: 'schedule://main'

        routing:
            # Route your OWN messages here; module messages are routed by their
            # bundle, so there is nothing to add per module.

when@test:
    framework:
        messenger:
            transports:
                async: 'in-memory://'
