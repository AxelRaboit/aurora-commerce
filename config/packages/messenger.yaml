framework:
    messenger:
        failure_transport: failed

        transports:
            sync: 'sync://'
            async:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                options:
                    queue_name: default
                retry_strategy:
                    max_retries: 3
                    delay: 5000
                    multiplier: 2
                    max_delay: 60000
            failed: 'doctrine://default?queue_name=failed'
            scheduler_main: 'schedule://main'

        # Module message routing is declared by each module's bundle
        # (prependExtension), e.g. AuroraBillingBundle routes ProcessOcrJobMessage
        # → async — so aurora-core's messenger config stays module-agnostic.

when@test:
    framework:
        messenger:
            transports:
                async: 'in-memory://'
