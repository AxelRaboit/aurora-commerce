# yaml-language-server: $schema=../vendor/symfony/routing/Loader/schema/routing.schema.json

# This file is the entry point to configure the routes of your app.
# Methods with the #[Route] attribute are automatically imported.
# See also https://symfony.com/doc/current/routing.html

# To list all registered routes, run the following command:
#   bin/console debug:router

controllers:
    resource: routing.controllers

dev_root:
    path: /dev
    controller: Symfony\Bundle\FrameworkBundle\Controller\RedirectController::redirectAction
    defaults:
        route: dev_dashboard
        permanent: true

# URL backward-compat after the PF Dashboard → Overview merge (2026-05).
# Existing bookmarks of /backend/personal-finance/dashboard keep working.
backend_personal_finance_dashboard:
    path: /backend/personal-finance/dashboard
    controller: Symfony\Bundle\FrameworkBundle\Controller\RedirectController::redirectAction
    defaults:
        route: backend_personal_finance_overview
        permanent: true
