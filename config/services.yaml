# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    app.admin_email: '%env(ADMIN_EMAIL)%'
    app.mailer_from: '%env(MAILER_FROM)%'
    app.upload_dir: '%kernel.project_dir%/public/uploads'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    Aurora\:
        resource: '../src/'

    # Auto-tag every MediaUsageProvider so the aggregator service collects them.
    # Auto-tag every registered front so the Registry collects them.
    # Auto-tag every menu location provider so the MenuLocationRegistry collects them.
    # Auto-tag every sequence prefix provider so the conflict listener validates uniqueness at boot.
    _instanceof:
        Aurora\Core\Module\Contract\ModuleInterface:
            tags: [aurora.module]
        Aurora\Core\Media\Contract\MediaUsageProviderInterface:
            tags: [aurora.media_usage_provider]
        Aurora\Core\Frontend\Contract\FrontendInterface:
            tags: [aurora.front]
        Aurora\Core\Menu\Contract\MenuLocationProviderInterface:
            tags: [aurora.menu_location_provider]
        Aurora\Core\Sequence\SequencePrefixProviderInterface:
            tags: [aurora.sequence_prefix]

    Aurora\Core\Media\Service\MediaUsageService:
        arguments:
            $providers: !tagged_iterator aurora.media_usage_provider

    Aurora\Core\Sequence\SequencePrefixConflictListener:
        arguments:
            $providers: !tagged_iterator aurora.sequence_prefix

    Aurora\Core\Frontend\Service\Registry:
        arguments:
            $fronts: !tagged_iterator aurora.front

    Aurora\Core\Menu\Service\MenuLocationRegistry:
        arguments:
            $providers: !tagged_iterator aurora.menu_location_provider

    Aurora\Core\Auth\Service\ImpersonationTokenService:
        arguments:
            $secret: '%kernel.secret%'

    Aurora\Core\Auth\Manager\AccessRequestManager:
        arguments:
            $adminEmail: '%app.admin_email%'
            $mailerFrom: '%app.mailer_from%'

    Aurora\Core\Auth\Manager\InvitationManager:
        arguments:
            $mailerFrom: '%app.mailer_from%'

    Aurora\Core\Auth\Manager\PasswordResetManager:
        arguments:
            $mailerFrom: '%app.mailer_from%'

    Aurora\Core\Auth\Manager\EmailVerificationManager:
        arguments:
            $mailerFrom: '%app.mailer_from%'

    Aurora\Core\Twig\VersionExtension:
        arguments:
            $projectDir: '%kernel.project_dir%'

    Aurora\Core\Theme\Service\ThemeResolver:
        arguments:
            $projectDir: '%kernel.project_dir%'

    Aurora\Core\Theme\Manager\ThemeManager:
        arguments:
            $projectDir: '%kernel.project_dir%'

    Aurora\Core\Setting\Command\DumpJsTranslationsCommand:
        arguments:
            $auroraDir: '%kernel.project_dir%'

    Aurora\Core\Module\Service\ModuleRegistry:
        arguments:
            $modules: !tagged_iterator aurora.module

    Aurora\Core\Module\Service\PermissionRegistry:
        arguments:
            $modules: !tagged_iterator aurora.module

    Aurora\Core\Module\Toggle\ModuleToggleRegistry:
        arguments:
            $modules: !tagged_iterator aurora.module

    Aurora\Core\Setting\View\ModulesViewBuilder:
        arguments:
            $modules: !tagged_iterator aurora.module

    Aurora\Module\Billing\Ocr\Service\DocTrClient:
        arguments:
            $baseUrl: '%env(OCR_DOCTR_URL)%'
            $timeout: '%env(int:OCR_HTTP_TIMEOUT)%'

    Aurora\Module\Billing\Ocr\Service\OllamaVisionClient:
        arguments:
            $baseUrl: '%env(OLLAMA_URL)%'
            $model: '%env(OLLAMA_VISION_MODEL)%'
            $timeout: '%env(int:OCR_HTTP_TIMEOUT)%'
            $numCtx: '%env(int:OCR_NUM_CTX)%'
            $numPredict: '%env(int:OCR_NUM_PREDICT)%'

    Aurora\Core\Mail\Service\MailService:
        arguments:
            $mailerFrom: '%app.mailer_from%'

    Aurora\Module\Ecommerce\Payment\StripeService:
        arguments:
            $secretKey: '%env(STRIPE_SECRET_KEY)%'
            $publicKey: '%env(STRIPE_PUBLIC_KEY)%'
            $webhookSecret: '%env(STRIPE_WEBHOOK_SECRET)%'

    Aurora\Module\Photo\Gallery\Service\GalleryAccessService:
        arguments:
            $appSecret: '%kernel.secret%'

