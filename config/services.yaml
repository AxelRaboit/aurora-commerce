# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    app.admin_email: '%env(ADMIN_EMAIL)%'
    app.mailer_from: '%env(MAILER_FROM)%'
    # Tout fichier stocké par Aurora vit ICI — hors document root.
    # Servi exclusivement via les controllers `*_serve` (voir
    # docs/aurora-core/dev/storage_policy.md). Apache ne sert rien
    # depuis ce dossier directement ; `mod_xsendfile` peut offload
    # les bytes une fois l'auth check passé côté PHP.
    app.upload_dir: '%kernel.project_dir%/var/uploads'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    Aurora\:
        resource: '../src/'
        # Extracted module packages ship their own config/services.php (loaded by
        # their bundle) — exclude them here to avoid double registration.
        # (Monorepo-split: each behaves as a separate Composer package.)
        exclude:
            # Fixtures extend doctrine/doctrine-fixtures-bundle's Fixture (a dev
            # dependency, absent in prod). Loaded dev/test-only via when@dev
            # below so a client's --no-dev build never compiles them. Ged is a
            # core module (loaded by this glob, not a standalone bundle), so its
            # DataFixtures need the same gating; the extracted modules handle it
            # in their own services.php + AbstractAuroraModuleBundle.
            - '../src/Core/DataFixtures/'
            - '../src/Module/Ged/DataFixtures/'
            - '../src/Module/Tools/'
            - '../src/Module/Crm/'
            - '../src/Module/Hr/'
            - '../src/Module/Notes/'
            - '../src/Module/PersonalFinance/'
            - '../src/Module/Planning/'
            - '../src/Module/Project/'
            - '../src/Module/Editorial/'
            - '../src/Module/Billing/'
            - '../src/Module/Assistant/'
            - '../src/Module/Photo/'
            # Merge case (aurora-commerce): Ecommerce + Erp ship together; one
            # services.php (Ecommerce/config) loads both namespaces.
            - '../src/Module/Ecommerce/'
            - '../src/Module/Erp/'

    # Auto-tag every MediaUsageProvider so the aggregator service collects them.
    # Auto-tag every registered front so the Registry collects them.
    # Auto-tag every menu location provider so the MenuLocationRegistry collects them.
    # Auto-tag every sequence prefix provider so the conflict listener validates uniqueness at boot.
    _instanceof:
        Aurora\Core\Module\Contract\ModuleInterface:
            tags: [aurora.module]
        Aurora\Module\Ged\Document\Contract\DocumentUsageProviderInterface:
            tags: [aurora.document_usage_provider]
        Aurora\Core\Frontend\Contract\FrontendInterface:
            tags: [aurora.front]
        Aurora\Module\Editorial\Menu\Contract\MenuLocationProviderInterface:
            tags: [aurora.menu_location_provider]
        Aurora\Core\Sequence\SequencePrefixProviderInterface:
            tags: [aurora.sequence_prefix]
        Aurora\Module\Configuration\Setting\Configuration\ConfigurationTabProviderInterface:
            tags: [aurora.configuration_tab_provider]
        Aurora\Module\Configuration\Setting\Provider\ApplicationParameterProviderInterface:
            tags: [aurora.application_parameter_provider]
        Aurora\Module\Assistant\Tool\Contract\ToolInterface:
            tags: [aurora.assistant.tool]
        Aurora\Core\Search\SearchProviderInterface:
            tags: [aurora.search_provider]
        Aurora\Core\Dashboard\DashboardStatsProviderInterface:
            tags: [aurora.dashboard_stats_provider]
        Aurora\Core\Search\BackendSearchProviderInterface:
            tags: [aurora.backend_search_provider]
        Aurora\Core\Content\BlockRendererInterface:
            tags: [aurora.content_block_renderer]
        Aurora\Core\Reference\EntityReferenceProviderInterface:
            tags: [aurora.entity_reference_provider]
        Aurora\Core\Scheduler\RecurringMessageProviderInterface:
            tags: [aurora.recurring_message_provider]

    Aurora\Core\Scheduler\MainSchedule:
        arguments:
            $providers: !tagged_iterator aurora.recurring_message_provider

    # Route loader that auto-discovers controllers of installed aurora-* module
    # packages. Client adds one `type: aurora_modules` routing entry.
    Aurora\Core\Routing\AuroraModuleRouteLoader:
        arguments:
            $projectDir: '%kernel.project_dir%'
        tags: [routing.loader]

    Aurora\Module\Ged\Document\Service\DocumentUsageService:
        arguments:
            $providers: !tagged_iterator aurora.document_usage_provider

    Aurora\Core\Sequence\SequencePrefixConflictListener:
        arguments:
            $providers: !tagged_iterator aurora.sequence_prefix

    Aurora\Core\Frontend\Service\Registry:
        arguments:
            $fronts: !tagged_iterator aurora.front

    Aurora\Module\Platform\Auth\Service\ImpersonationTokenService:
        arguments:
            $secret: '%kernel.secret%'

    Aurora\Module\Platform\Auth\Manager\AccessRequestManager:
        arguments:
            $adminEmail: '%app.admin_email%'
            $mailerFrom: '%app.mailer_from%'

    Aurora\Module\Platform\Auth\Manager\InvitationManager:
        arguments:
            $mailerFrom: '%app.mailer_from%'

    Aurora\Module\Platform\Auth\Manager\PasswordResetManager:
        arguments:
            $mailerFrom: '%app.mailer_from%'

    Aurora\Module\Platform\Auth\Manager\EmailVerificationManager:
        arguments:
            $mailerFrom: '%app.mailer_from%'

    Aurora\Core\Twig\VersionExtension:
        arguments:
            $projectDir: '%kernel.project_dir%'

    Aurora\Module\Configuration\Theme\Service\ThemeResolver:
        arguments:
            $projectDir: '%kernel.project_dir%'

    Aurora\Module\Configuration\Theme\Manager\ThemeManager:
        arguments:
            $projectDir: '%kernel.project_dir%'

    Aurora\Module\Configuration\Setting\Command\DumpJsTranslationsCommand:
        arguments:
            $auroraDir: '%kernel.project_dir%'

    Aurora\Core\Module\Service\ModuleRegistry:
        arguments:
            $modules: !tagged_iterator aurora.module

    Aurora\Core\Module\Service\PermissionRegistry:
        arguments:
            $modules: !tagged_iterator aurora.module

    Aurora\Core\Module\Toggle\ModuleToggleRegistry:
        arguments:
            $modules: !tagged_iterator aurora.module

    Aurora\Module\Configuration\Setting\View\ModulesViewBuilder:
        arguments:
            $modules: !tagged_iterator aurora.module

    Aurora\Module\Configuration\Setting\Configuration\SettingDefinitionRegistry:
        arguments:
            $providers: !tagged_iterator aurora.configuration_tab_provider

    Aurora\Core\Mail\Service\MailService:
        arguments:
            $mailerFrom: '%app.mailer_from%'

# Core fixtures are dev/test-only (see exclude above). AuroraBundle imports this
# file into every client, so this gating protects client prod builds too.
when@dev:
    services:
        _defaults:
            autowire: true
            autoconfigure: true
        Aurora\Core\DataFixtures\:
            resource: '../src/Core/DataFixtures/'
        Aurora\Module\Ged\DataFixtures\:
            resource: '../src/Module/Ged/DataFixtures/'

when@test:
    services:
        _defaults:
            autowire: true
            autoconfigure: true
        Aurora\Core\DataFixtures\:
            resource: '../src/Core/DataFixtures/'
        Aurora\Module\Ged\DataFixtures\:
            resource: '../src/Module/Ged/DataFixtures/'


