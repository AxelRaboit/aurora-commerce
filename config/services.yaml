# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    app.admin_email: '%env(ADMIN_EMAIL)%'
    app.mailer_from: '%env(MAILER_FROM)%'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    Aurora\:
        resource: '../src/'

    Aurora\Core\Auth\Manager\AccessRequestManager:
        arguments:
            $adminEmail: '%app.admin_email%'
            $mailerFrom: '%app.mailer_from%'

    Aurora\Core\Auth\Manager\InvitationManager:
        arguments:
            $mailerFrom: '%app.mailer_from%'

    Aurora\Module\Editorial\Form\Manager\FormManager:
        arguments:
            $mailerFrom: '%app.mailer_from%'


    Aurora\Core\Auth\Manager\PasswordResetManager:
        arguments:
            $mailerFrom: '%app.mailer_from%'

    Aurora\Core\Auth\Manager\EmailVerificationManager:
        arguments:
            $mailerFrom: '%app.mailer_from%'

    Aurora\Core\Twig\VersionExtension:
        arguments:
            $projectDir: '%kernel.project_dir%'

    Aurora\Core\Theme\Service\ThemeResolver:
        arguments:
            $projectDir: '%kernel.project_dir%'

    Aurora\Core\Theme\Manager\ThemeManager:
        arguments:
            $projectDir: '%kernel.project_dir%'

    Aurora\Core\Setting\Command\DumpJsTranslationsCommand:
        arguments:
            $projectDir: '%kernel.project_dir%'

    Aurora\Core\Module\ModuleRegistry:
        arguments:
            $modules: !tagged_iterator aurora.module

    Aurora\Core\Module\PermissionRegistry:
        arguments:
            $modules: !tagged_iterator aurora.module

    Aurora\Core\CoreModule:
        tags: [aurora.module]

    Aurora\Module\Editorial\EditorialModule:
        tags: [aurora.module]

    Aurora\Module\Crm\CrmModule:
        tags: [aurora.module]

    Aurora\Module\Erp\ErpModule:
        tags: [aurora.module]

    Aurora\Module\Ecommerce\EcommerceModule:
        tags: [aurora.module]
