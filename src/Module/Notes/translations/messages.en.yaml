backend:
  parameters:
    notes_markdown_image_max_edge:
      label: Maximum size of uploaded images (px)
      description: "Longest edge in pixels. Images larger than this are downscaled in the browser before upload. Recommended: 2048."
    notes_markdown_image_quality_pct:
      label: WebP encoding quality (%)
      description: "WebP quality applied during the resize, 0 to 100. Recommended: 85 (good size/quality trade-off)."
    notes_block_image_max_edge:
      label: Maximum size of uploaded images (px)
      description: "Longest edge in pixels. Images larger than this are downscaled in the browser before upload. Recommended: 2048."
    notes_block_image_quality_pct:
      label: WebP encoding quality (%)
      description: "WebP quality applied during the resize, 0 to 100. Recommended: 85 (good size/quality trade-off)."
  permissions:
    names:
      notes:
        markdown:
          use: Use Markdown notes
        block:
          use: Use Block notes
  nav:
    sections:
      notes: Notes
    notes_markdown: Markdown notes
    notes_markdown_description: Obsidian-style Markdown note-taking (wiki-links, graph)
    notes_block: Block notes
    notes_block_description: Notion-style block-based note-taking
  audit:
    actions:
      notes_markdown:
        note:
          created: Note created
          updated: Note updated
          deleted: Note deleted
        tag:
          renamed: Tag renamed
          merged: Tags merged
          removed: Tag removed
      notes_block:
        note:
          created: Block note created
          updated: Block note updated
          deleted: Block note deleted
        tag:
          renamed: Tag renamed
          merged: Tags merged
          removed: Tag removed

