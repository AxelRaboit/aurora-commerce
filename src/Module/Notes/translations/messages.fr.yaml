backend:
  parameters:
    notes_markdown_image_max_edge:
      label: Notes Markdown — Taille max des images (px)
      description: "Notes Markdown : côté le plus long, en pixels. Les images dépassant cette limite sont redimensionnées côté navigateur avant l'envoi. Recommandé : 2048."
    notes_markdown_image_quality_pct:
      label: Notes Markdown — Qualité d'encodage WebP (%)
      description: "Notes Markdown : qualité WebP appliquée au redimensionnement, entre 0 et 100. Recommandé : 85 (bon compromis taille/qualité)."
    notes_block_image_max_edge:
      label: Notes Block — Taille max des images (px)
      description: "Notes Block : côté le plus long, en pixels. Les images dépassant cette limite sont redimensionnées côté navigateur avant l'envoi. Recommandé : 2048."
    notes_block_image_quality_pct:
      label: Notes Block — Qualité d'encodage WebP (%)
      description: "Notes Block : qualité WebP appliquée au redimensionnement, entre 0 et 100. Recommandé : 85 (bon compromis taille/qualité)."
  permissions:
    names:
      notes:
        markdown:
          use: Utiliser les notes Markdown
        block:
          use: Utiliser les notes Block
        post_it:
          use: Utiliser les notes Post-it
  modules:
    notes_backend: Notes
    notes_backend_description: Active la prise de notes (Markdown, Block, Post-it).
  nav:
    sections:
      notes: Notes
    notes_markdown: Notes Markdown
    notes_markdown_description: Prise de notes Markdown façon Obsidian (wiki-links, graphe)
    notes_block: Notes Block
    notes_block_description: Prise de notes par blocs façon Notion
    notes_post_it: Notes Post-it
    notes_post_it_description: Notes courtes type post-it, organisation visuelle sur tableau
  audit:
    actions:
      notes_markdown:
        note:
          created: Note créée
          updated: Note mise à jour
          deleted: Note supprimée
        tag:
          renamed: Tag renommé
          merged: Tags fusionnés
          removed: Tag supprimé
      notes_block:
        note:
          created: Note Block créée
          updated: Note Block mise à jour
          deleted: Note Block supprimée
        tag:
          renamed: Tag renommé
          merged: Tags fusionnés
          removed: Tag supprimé

