  parameters:
    site_name:
      label: Nom du site
      description: Nom affiché sur le site public et dans les emails
      placeholder: Aurora — Application de gestion
    site_description:
      label: Description du site
      description: Courte description utilisée comme meta description par défaut
      placeholder: Plateforme de gestion d'entreprise multi-modules
    site_url:
      label: URL publique du site
      description: 'URL absolue du site (sans slash final), utilisée dans les emails et le sitemap'
      placeholder: 'https://app.example.com'
    admin_email:
      label: Email administrateur
      description: Adresse email de l'administrateur
      placeholder: 'admin@example.com'
    default_locale:
      label: Langue par défaut
      description: 'Langue par défaut du site (affichage public, emails par défaut).'
    single_locale_mode:
      label: Mode mono-langue
      description: "Si activé, l'application n'affiche et n'enregistre qu'une seule langue (celle définie par « Langue par défaut »). Les onglets multi-langues sont masqués et les URLs avec un autre code de langue sont redirigées (301). Réversible : les contenus saisis dans les autres langues restent en base."
    posts_per_page:
      label: Articles par page
      description: Nombre d'articles affichés par page sur les listes publiques
      placeholder: 10
    max_upload_size_mb:
      label: Taille max d'upload (Mo)
      description: 'Taille maximale autorisée pour un upload média, en mégaoctets'
      placeholder: 8
    allowed_upload_extensions:
      label: Extensions autorisées
      description: "Liste d'extensions autorisées séparées par virgule (jpg,png,pdf,…)"
      placeholder: jpg,jpeg,png,gif,webp,pdf
    timezone:
      label: Fuseau horaire
      description: 'Fuseau horaire PHP (ex: Europe/Paris)'
    date_format:
      label: Format d'affichage des dates
      description: "Format d'affichage des dates (ex: d/m/Y)"
    comments_enabled:
      label: Commentaires activés
      description: 'Si activé, les visiteurs peuvent laisser des commentaires sur les articles du site public.'
    comment_moderation_enabled:
      label: Modération des commentaires
      description: 'Si activé, les commentaires sont en attente de modération avant publication. Si désactivé, ils sont approuvés automatiquement.'
    maintenance_mode:
      label: Mode maintenance
      description: 'Si activé, le site public est fermé aux visiteurs et affiche une page de maintenance.'
    admin_registration_enabled:
      label: Inscriptions admin ouvertes
      description: Autoriser les inscriptions via /register (interface admin). À désactiver après la création du premier compte admin.
    admin_access_request_enabled:
      label: Demandes d'accès admin ouvertes
      description: Autoriser les demandes d'accès via /access-request (formulaire de demande d'accès à l'administration)
    front_registration_enabled:
      label: Inscriptions frontend ouvertes
      description: 'Si activé, les visiteurs peuvent créer un compte depuis le site public.'
    post_revisions_limit:
      label: Nombre de révisions gardées par article
      description: Nombre maximal de révisions conservées par article (les plus anciennes sont supprimées)
    trash_auto_purge_days:
      label: Purge auto de la corbeille (jours)
      description: Nombre de jours avant suppression définitive des articles en corbeille (0 = jamais)
    homepage_post_id:
      label: Page d'accueil (ID du post)
      description: ID d'un post affiché sur la page d'accueil. Vide = liste des derniers articles.
    default_front:
      label: Front par défaut
      description: 'Slug du front affiché par défaut sur "/".'
    logo_media_id:
      label: Logo du site
      description: ID du média utilisé comme logo
    favicon_media_id:
      label: Favicon
      description: ID du média utilisé comme favicon
    seo_title_template:
      label: Template de titre SEO
      description: 'Template pour le titre des pages. Utilisez {title} et {siteName}. Ex. : {title} · {siteName}'
      placeholder: '{title} · {siteName}'
    seo_default_description:
      label: Description SEO par défaut
      description: Meta description utilisée quand aucune description spécifique n'est définie
      placeholder: Plateforme de gestion d'entreprise — modules CRM, ventes, GED…
    seo_default_og_image:
      label: Image Open Graph par défaut
      description: Image utilisée pour les previews sociaux (Facebook, LinkedIn, Twitter…) quand la page n'en définit pas. 1200×630 px recommandé.
    seo_twitter_handle:
      label: Handle Twitter / X
      description: 'Handle Twitter du site (avec @, ex : @aurora_app). Utilisé pour la balise twitter:site dans les Twitter Cards.'
      placeholder: '@aurora_app'
    email_locale:
      label: Langue forcée pour les emails
      description: "Langue à utiliser pour tous les emails sortants. « Suivre la langue par défaut » applique la langue par défaut du site."
    email_locale_auto: Suivre la langue par défaut
    core_user_prefix:
      label: Préfixe des références utilisateurs
      description: 'Préfixe de la référence auto-générée (ex: XXX). Laissez vide pour désactiver.'
    core_media_prefix:
      label: Préfixe des références médias
      description: 'Préfixe de la référence auto-générée (ex: XXX). Laissez vide pour désactiver.'
    core_access_request_prefix:
      label: Préfixe des références demandes d'accès
