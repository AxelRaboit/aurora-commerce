    core_reset_password_prefix:
      label: Préfixe des demandes de réinitialisation de mot de passe
      description: 'Préfixe de la référence auto-générée (ex: XXX). Laissez vide pour désactiver.'
    core_media_folder_prefix:
      label: Préfixe des références dossiers médias
      description: 'Préfixe de la référence auto-générée (ex: XXX). Laissez vide pour désactiver.'
    core_menu_item_prefix:
      label: Préfixe des références éléments de menu
      description: 'Préfixe de la référence auto-générée (ex: XXX). Laissez vide pour désactiver.'
    nav_section_aliases:
      label: Alias des sections de navigation
      description: 'Carte JSON des alias de sections (géré via l''interface).'
    nav_item_aliases:
      label: Alias des items de navigation
      description: 'Carte JSON des alias d''items du menu (géré via l''interface).'
    color_picker_presets:
      label: Palette du picker de couleurs
      description: 'Liste JSON de couleurs hexadécimales proposées en raccourci dans tous les sélecteurs de couleurs de l''admin.'
