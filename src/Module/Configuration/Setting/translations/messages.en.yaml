      description: Auto-generated reference prefix (e.g. XXX). Leave empty to disable.
    core_reset_password_prefix:
      label: Password reset request prefix
      description: Auto-generated reference prefix (e.g. XXX). Leave empty to disable.
    core_media_folder_prefix:
      label: Media folder reference prefix
      description: Auto-generated reference prefix (e.g. XXX). Leave empty to disable.
    core_menu_item_prefix:
      label: Menu item reference prefix
      description: Auto-generated reference prefix (e.g. XXX). Leave empty to disable.
    nav_section_aliases:
      label: Navigation section aliases
      description: JSON map of section aliases (managed via the UI).
    nav_item_aliases:
