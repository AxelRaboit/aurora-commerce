assistant:
  title: AI Assistant
  errors:
    message_empty: Message cannot be empty.
  chat:
    placeholder: Ask the assistant a question…
    send: Send
    empty: Start a new conversation to chat with the assistant.
    no_conversations: No conversations yet.
    new: New conversation
    delete: Delete
    delete_confirm: 'Permanently delete the conversation "{title}"?'
    untitled: Untitled
    thinking: Assistant is thinking…
    tool_call: Tool call
    tool_result: Tool result
    source: Source
    source_all: All sources
    confirm_required: Action requires confirmation
    approve: Approve
    reject: Reject
  mount_point:
    title: Mount points
    description: Filesystem paths the assistant is allowed to access.
    add: Add mount point
    edit: Edit
    edit_title: 'Edit "{name}"'
    delete: Delete
    delete_confirm: 'Delete the mount point "{name}"?'
    fields:
      name: Name
      path: Absolute path
      access: Access
      active: Active
    access:
      read_only: Read only
      read_write: Read + write
    placeholder:
      name: e.g. Downloads
      path: /home/user/Downloads
    errors:
      name_required: Name is required.
      path_required: Path is required.
      path_absolute: Path must be absolute (start with /).
    empty: No mount points configured. Add one so the assistant can read files.
    search_placeholder: Search by name or path…

backend:
  modules:
    assistant: AI Assistant
  audit:
    actions:
      assistant:
        conversation:
          created: Conversation created
          deleted: Conversation deleted
          renamed: Conversation renamed
        mount_point:
          created: Mount point added
          updated: Mount point updated
          deleted: Mount point deleted
  settings:
    tabs:
      assistant: Assistant
  parameters:
    assistant_provider:
      label: AI provider
      description: 'Choose between Ollama (local) and Anthropic Claude (cloud). For Anthropic, set ANTHROPIC_API_KEY in .env.local and set the Chat model to a Claude identifier (e.g. claude-haiku-4-5).'
    assistant_chat_model:
      label: Chat model
      description: 'Ollama: must support tool calling (e.g. qwen3:8b). Anthropic: claude-haiku-4-5, claude-sonnet-4-6, claude-opus-4-7.'
    assistant_vision_model:
      label: Vision model
      description: 'Model used by the image_read tool to describe or OCR images (e.g. qwen2.5vl:3b, llava:7b).'
    assistant_http_timeout:
      label: HTTP timeout (s)
      description: 'Per-request idle timeout (Ollama or Anthropic), in seconds. Raise if you hit transport errors mid-generation. .env default: 300.'
    assistant_num_ctx:
      label: Context window (num_ctx)
      description: 'Token count loaded into the model context. Higher = longer conversations but more RAM. .env default: 8192.'
    assistant_max_tokens:
      label: Max tokens (response)
      description: 'Maximum number of tokens in the response. Recommended: 4096.'
    assistant_system_prompt:
      label: System prompt
      description: 'Instructions given to the model at the start of every conversation. Uses the built-in Aurora default if empty.'
  nav:
    sections:
      assistant: Assistant
    assistant: AI Assistant
    assistant_description: Chat with the local AI assistant (Ollama)
    assistant_mount_points: Mount points
    assistant_mount_points_description: Configure folders the assistant can read
  permissions:
    names:
      assistant:
        use: Use the AI assistant
