backend:
  modules:
    assistant: Assistant IA
  audit:
    actions:
      assistant:
        conversation:
          created: Conversation créée
          deleted: Conversation supprimée
          renamed: Conversation renommée
        mount_point:
          created: Point de montage ajouté
          updated: Point de montage modifié
          deleted: Point de montage supprimé
  settings:
    tabs:
      assistant: Assistant
  parameters:
    assistant_provider:
      label: Fournisseur IA
      description: 'Choisir entre Ollama (local) et Anthropic Claude (cloud). Pour Anthropic, configurer ANTHROPIC_API_KEY dans .env.local et choisir un modèle Claude dans "Modèle de chat" (ex. claude-haiku-4-5).'
    assistant_chat_model:
      label: Modèle de chat
      description: 'Ollama : doit supporter le tool calling (ex. qwen3:8b). Anthropic : claude-haiku-4-5, claude-sonnet-4-6, claude-opus-4-7.'
    assistant_vision_model:
      label: Modèle vision
      description: 'Modèle utilisé par l''outil image_read pour décrire ou OCR les images (ex. qwen2.5vl:3b, llava:7b).'
    assistant_http_timeout:
      label: Timeout HTTP (s)
      description: 'Idle timeout par requête (Ollama ou Anthropic), en secondes. Augmente si tu vois des transport errors mi-génération. Défaut .env : 300.'
    assistant_num_ctx:
      label: Fenêtre de contexte (num_ctx)
      description: 'Nombre de tokens chargés dans la fenêtre de contexte. Plus haut = conversations plus longues mais plus de RAM. Défaut .env : 8192.'
    assistant_max_tokens:
      label: Tokens max (réponse)
      description: 'Nombre maximum de tokens dans la réponse. Recommandé : 4096.'
    assistant_system_prompt:
      label: Prompt système
      description: 'Instructions données au modèle au début de chaque conversation. Si vide, le prompt Aurora par défaut est utilisé.'
  nav:
    sections:
