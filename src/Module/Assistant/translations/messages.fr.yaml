backend:
  settings:
    tabs:
      assistant: Assistant
  parameters:
    assistant_chat_model:
      label: Modèle Ollama (chat)
      description: 'Nom exact du modèle Ollama à utiliser pour les conversations (ex. qwen3:8b, mistral-nemo, llama3.1:8b). Le modèle doit supporter le tool calling. Laisse vide pour retomber sur ASSISTANT_CHAT_MODEL du .env.'
    assistant_vision_model:
      label: Modèle Ollama (vision)
      description: 'Modèle vision-capable utilisé par l''outil image_read pour décrire/OCR les images (ex. qwen2.5vl:3b, llava:7b, minicpm-v). Laisse vide pour retomber sur ASSISTANT_VISION_MODEL du .env.'
    assistant_http_timeout:
      label: Timeout HTTP Ollama (s)
      description: 'Idle timeout par requête Ollama, en secondes. Augmente sur CPU/petite machine si tu vois des transport errors mi-génération. Défaut .env : 300.'
    assistant_num_ctx:
      label: Fenêtre de contexte (num_ctx)
      description: 'Nombre de tokens chargés dans la fenêtre de contexte du modèle. Plus haut = conversations plus longues mais plus de RAM. Défaut .env : 8192.'
    assistant_system_prompt:
      label: Prompt système
      description: 'Instructions données au modèle au début de chaque conversation. Laisse vide pour utiliser le prompt par défaut intégré à Aurora.'
  nav:
    sections:
      assistant: Assistant
    assistant: Assistant IA
    assistant_description: Discuter avec l'assistant IA local (Ollama)
    assistant_mount_points: Points de montage
    assistant_mount_points_description: Configurer les dossiers que l'assistant peut lire
  permissions:
    names:
      assistant:
        use: Utiliser l'assistant IA
