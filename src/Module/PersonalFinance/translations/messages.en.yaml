backend:
  permissions:
    names:
      personal_finance:
        wallets:
          use: Manage own wallets
        categories:
          use: Manage categories
        transactions:
          use: Manage transactions
        budgets:
          use: Manage monthly budgets
        goals:
          use: Manage savings goals
        recurring:
          use: Manage recurring and scheduled transactions
        categorization:
          use: Manage auto-categorization rules
        overview:
          use: View the cross-wallet global overview
        statistics:
          use: View time-series statistics
        budget_presets:
          use: Manage reusable month templates
        import:
          use: Import transactions from an Excel file
  modules:
    personal_finance_backend: Personal Finance
    personal_finance_backend_description: 'Personal finance management: wallets, monthly budget, transactions, transfers, savings goals, recurring transactions, categories, statistics.'
  nav:
    sections:
      personal_finance: Personal Finance
    personal_finance_wallets: Wallets
    personal_finance_wallets_description: Manage your wallets (checking accounts, savings, cash) and their initial balance.
    personal_finance_categories: Categories
    personal_finance_categories_description: 'Per-wallet transaction taxonomy (Groceries, Leisure, Salary…).'
    personal_finance_transactions: Transactions
    personal_finance_transactions_description: 'Wallet income and expenses, dated and categorized.'
    personal_finance_budgets: Budgets
    personal_finance_budgets_description: 'Monthly budget per wallet: sections, planned vs actual lines, carry-over.'
    personal_finance_budget_presets: Month templates
    personal_finance_budget_presets_description: 'Reusable month templates. Capture an existing month''s structure and apply it to another month (holidays, slow month, back to school…).'
    personal_finance_import: Excel import
    personal_finance_import_description: 'Bulk-import a transaction history from an Excel file (template provided). Per-row validation, missing categories are created automatically.'
    personal_finance_goals: Goals
    personal_finance_goals_description: 'Savings goals with progress tracking. Linking a category enables automatic sync from transactions.'
    personal_finance_recurring: Automations
    personal_finance_recurring_description: 'Recurring transactions (monthly on a fixed day) and scheduled one-offs.'
    personal_finance_categorization: Auto-categorization
    personal_finance_categorization_description: 'Description → category rules learnt automatically every time you categorise a transaction.'
    personal_finance_overview: Global overview
    personal_finance_overview_description: 'Cross-wallet summary: cumulative balance, monthly aggregated flow, per-wallet and per-category breakdowns, recent transactions across every wallet.'
    personal_finance_statistics: Statistics
    personal_finance_statistics_description: 'Time-series analyses over 3, 6 or 12 months: month-by-month income / expense flow, per-category trend, current-month versus same-month-last-year comparison.'
  parameters:
    personal_finance_default_currency:
      label: Default currency
      description: ISO 4217 code (e.g. EUR, USD, CHF) used by default for new wallets and transactions.

