    title: Adjust balance
    open: Adjust
    hint: Enter the real balance — an adjustment transaction will be created to bridge the gap.
    submit: Adjust
    success: Balance adjusted.
    fields:
      new_balance: Real balance
      date: Date
      description: Description (optional)
