      new_balance: '0.00'
      description: e.g. bank statement correction…
    errors:
      new_balance_required: The new balance is required.
      new_balance_format: 'Invalid format. Example: 1234.56'
      date_required: Date is required.
      no_diff: The new balance already matches the computed one — nothing to adjust.
