shared:
  mail:
    invitation:
      cta: Activate my account
      expires: This link expires on {date}.
      fallback_intro: 'If the button does not work, copy and paste this link into your browser:'
      footer_note: If you were not expecting this invitation, you can safely ignore this email.
      greeting: Hi {name},
      heading: Invitation to join Aurora
      intro: You have been invited to join {siteName}. Click the button below to activate your account and set your password.
    verify_email:
      cta: Confirm my email
      expires: This link expires on {date}.
      fallback_intro: 'If the button does not work, copy and paste this link into your browser:'
      footer_note: If you did not create an account, you can safely ignore this email.
      greeting: Hi {name},
      heading: Confirm your email address
      intro: Thanks for signing up at {siteName}. Click the button below to confirm your email address and activate your account.
    reset_password:
      cta: Reset my password
      expires: This link expires in 1 hour.
      expires_at: This link expires on {date}.
      fallback_intro: 'If the button does not work, copy and paste this link into your browser:'
      footer_note: If you did not request a password reset, you can safely ignore this email.
      greeting: Hi {name},
      heading: Reset your password
      intro: You requested a password reset on {siteName}. Click the button below to choose a new password.
    access_request_admin:
      heading: New access request
      intro: A new access request has been received.
      label_name: Name
      label_email: Email
      label_message: Message
      cta: View in admin
      footer_note: This email was sent automatically, please do not reply.
    access_request_approved:
      heading: Your request has been approved
      greeting: Hi {name},
      intro: Your access request for {siteName} has been approved.
      credentials_intro: 'An account has been created for you with the following credentials:'
      label_email: Email
      label_password: Password
      password_note: Remember to change your password after your first login.
      existing_account: You can sign in with your existing account.
      cta: Go to admin
      footer_note: This email was sent automatically, please do not reply.
    access_request_rejected:
      heading: Access request not granted
      greeting: Hi {name},
      intro: After review, your access request could not be granted.
      retry: If you think this is a mistake, feel free to submit a new request.
      footer_note: This email was sent automatically, please do not reply.
  errors:
