  parameters:
    site_name:
      label: Site name
      description: Name displayed on the public site and in emails
    site_description:
      label: Site description
      description: Short description used as the default meta description
    site_url:
      label: Public site URL
      description: 'Absolute URL of the site (no trailing slash), used in emails and the sitemap'
    admin_email:
      label: Administrator email
      description: Email address of the administrator
    default_locale:
      label: Default locale
      description: 'Default language of the site (public display, fallback email locale).'
    single_locale_mode:
      label: Single-locale mode
      description: "If enabled, the application only displays and stores a single language (the one defined by 'Default locale'). Multi-language tabs are hidden and URLs with a different language code are redirected (301). Reversible: content entered in other languages remains in the database."
    posts_per_page:
      label: Posts per page
      description: Number of posts displayed per page on public lists
    max_upload_size_mb:
      label: Max upload size (MB)
      description: 'Maximum allowed size for a media upload, in megabytes'
    allowed_upload_extensions:
      label: Allowed extensions
      description: 'Comma-separated list of allowed extensions (jpg,png,pdf,…)'
    timezone:
      label: Timezone
      description: PHP timezone (e.g. Europe/Paris)
    date_format:
      label: Date display format
      description: Date display format (e.g. d/m/Y)
    comments_enabled:
      label: Comments enabled
      description: 'If enabled, visitors can leave comments on public articles.'
    comment_moderation_enabled:
      label: Comment moderation
      description: 'If enabled, comments await moderation before publication. If disabled, they are automatically approved.'
    maintenance_mode:
      label: Maintenance mode
      description: 'If enabled, the public site is closed to visitors and displays a maintenance page.'
    admin_registration_enabled:
      label: Admin registrations open
      description: Allow registrations via /register (admin interface). Disable after creating the first admin account.
    admin_access_request_enabled:
      label: Admin access requests open
      description: Allow access requests via /access-request (access request form for the administration)
    front_registration_enabled:
      label: Front-end registrations open
      description: 'If enabled, visitors can create an account from the public site.'
    post_revisions_limit:
      label: Post revisions kept
      description: Maximum number of revisions kept per post (oldest are deleted)
    trash_auto_purge_days:
      label: Auto-purge trash (days)
      description: Number of days before permanent deletion of trashed posts (0 = never)
    homepage_post_id:
      label: Homepage post ID
      description: ID of a post displayed on the homepage. Empty = latest posts list.
    default_front:
      label: Default front
      description: 'Slug of the front displayed by default on "/".'
    logo_media_id:
      label: Site logo
      description: ID of the media used as the logo
    favicon_media_id:
      label: Favicon
      description: ID of the media used as the favicon
    seo_title_template:
      label: SEO title template
      description: 'Template for page titles. Use {title} and {siteName}. E.g. {title} · {siteName}'
    seo_default_description:
      label: Default SEO description
      description: Meta description used when no specific description is defined
    seo_default_og_image:
      label: Default Open Graph image
      description: Image used for social previews (Facebook, LinkedIn, Twitter…) when the page doesn't define one. 1200×630 px recommended.
    seo_twitter_handle:
      label: Twitter / X handle
      description: 'Twitter handle of the site (with @, e.g.: @aurora_app). Used in the twitter:site Twitter Cards meta tag.'
    ged_document_prefix:
      label: DMS document reference prefix
      description: Auto-generated DMS document reference prefix (e.g. DOC). Leave empty to disable.
    billing_invoice_prefix:
