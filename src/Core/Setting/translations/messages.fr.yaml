    date_format:
      label: Format d'affichage des dates
      description: "Format d'affichage des dates (ex: d/m/Y)"
    comments_enabled:
      label: Commentaires activés
      description: 'Si activé, les visiteurs peuvent laisser des commentaires sur les articles du site public.'
    comment_moderation_enabled:
      label: Modération des commentaires
      description: 'Si activé, les commentaires sont en attente de modération avant publication. Si désactivé, ils sont approuvés automatiquement.'
    maintenance_mode:
      label: Mode maintenance
      description: 'Si activé, le site public est fermé aux visiteurs et affiche une page de maintenance.'
    admin_registration_enabled:
      label: Inscriptions admin ouvertes
      description: Autoriser les inscriptions via /register (interface admin). À désactiver après la création du premier compte admin.
    admin_access_request_enabled:
      label: Demandes d'accès admin ouvertes
      description: Autoriser les demandes d'accès via /access-request (formulaire de demande d'accès à l'administration)
    front_registration_enabled:
      label: Inscriptions frontend ouvertes
      description: 'Si activé, les visiteurs peuvent créer un compte depuis le site public.'
    post_revisions_limit:
      label: Nombre de révisions gardées par article
      description: Nombre maximal de révisions conservées par article (les plus anciennes sont supprimées)
    trash_auto_purge_days:
      label: Purge auto de la corbeille (jours)
      description: Nombre de jours avant suppression définitive des articles en corbeille (0 = jamais)
    homepage_post_id:
      label: Page d'accueil (ID du post)
      description: ID d'un post affiché sur la page d'accueil. Vide = liste des derniers articles.
    default_front:
      label: Front par défaut
      description: 'Slug du front affiché par défaut sur "/".'
    logo_media_id:
      label: Logo du site
      description: ID du média utilisé comme logo
    favicon_media_id:
      label: Favicon
      description: ID du média utilisé comme favicon
    seo_title_template:
      label: Template de titre SEO
      description: 'Template pour le titre des pages. Utilisez {title} et {siteName}. Ex. : {title} · {siteName}'
    seo_default_description:
      label: Description SEO par défaut
      description: Meta description utilisée quand aucune description spécifique n'est définie
    ecommerce_low_stock_threshold:
      label: Seuil de stock bas (e-commerce)
      description: Affiche un avertissement « Plus que X en stock » sur la fiche produit quand le stock disponible est inférieur ou égal à cette valeur. Mettre 0 pour désactiver l'avertissement.
    ged_document_prefix:
      label: Préfixe des références documents GED
      description: 'Préfixe de la référence document GED auto-générée (ex: DOC). Laissez vide pour désactiver.'
