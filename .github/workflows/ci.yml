name: CI

on:
  # Direct pushes only on long-lived branches; feature branches are tested
  # via their pull_request event so we don't run the same commit twice.
  push:
    branches: [main, develop]
  pull_request:

# A second push on the same ref cancels the previous in-flight run instead
# of queueing a duplicate.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  symfony:
    name: Symfony ${{ matrix.symfony-version }} | PHP ${{ matrix.php-version }} | Node ${{ matrix.node-version }} | PNPM ${{ matrix.pnpm-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        symfony-version: [ 7.4 ]
        php-version: [ 8.4 ]
        node-version: [ 24 ]
        pnpm-version: [ 10 ]
    env:
      extensions: mbstring, xml, ctype, iconv, intl, pdo, pdo_pgsql, dom, filter, json, tokenizer
      APP_ENV: test
      APP_SECRET: ci_secret_not_used_in_prod
      DATABASE_URL: postgresql://app:!ChangeMe!@127.0.0.1:5432/aurora?serverVersion=18&charset=utf8
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: "!ChangeMe!"
          POSTGRES_DB: aurora
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      # —— Setup GitHub actions 🐙 ———————————————————————————————————————————————————
      - name: Checkout
        uses: actions/checkout@v4

      # —— PHP & Composer 🧙‍️ —————————————————————————————————————————————————————————
      - name: Setup PHP, extensions & composer with shivammathur/setup-php
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: composer:v2
          extensions: ${{ env.extensions }}
          ini-values: post_max_size=256M, max_execution_time=180
        env:
          update: true

      - name: Check PHP Version
        run: php -v

      - name: Validate composer.json and composer.lock
        run: composer validate

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache PHP dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install PHP dependencies
        run: composer install --no-ansi --no-interaction --prefer-dist --no-scripts

      - name: Check if any dependencies are compromised
        run: composer audit || true

      - name: Install PHP code quality tools
        run: |
          (cd tools/php-cs-fixer && composer install && chmod +x vendor/bin/*)
          (cd tools/twig-cs-fixer && composer install && chmod +x vendor/bin/*)
          (cd tools/rector && composer install && chmod +x vendor/bin/*)
          (cd tools/phpstan && composer install && chmod +x vendor/bin/*)

      # —— Symfony ⚡ ——————————————————————————————————————————————————————————————————
      - name: Create test database
        env:
          PGPASSWORD: "!ChangeMe!"
        run: psql -h 127.0.0.1 -U app -d aurora -c "CREATE DATABASE aurora_test;"

      - name: Run migrations
        run: php bin/console doctrine:migrations:migrate --no-interaction

      # —— PNPM & Vite 🟨 ————————————————————————————————————————————————————————————
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install pnpm
        run: npm install -g pnpm@${{ matrix.pnpm-version }}

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - uses: actions/cache@v4
        name: Setup pnpm cache
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Build assets
        run: pnpm build

      # —— Coding standards ✨ ——————————————————————————————————————————————————————
      - name: PHP CS Fixer
        run: make lint-php

      - name: Lint Twig
        run: make lint-twig

      - name: Create cache directories
        run: mkdir -p var/cache/rector var/cache/phpstan

      - name: Rector Cache
        uses: actions/cache@v4
        with:
          path: var/cache/rector
          key: ${{ runner.os }}-rector-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-rector-

      - name: Rector
        run: make rector

      - name: Lint JavaScript
        run: make lint-js

      # —— Static analysis ✨ —————————————————————————————————————————————————
      - name: PHPStan Cache
        uses: actions/cache@v4
        with:
          path: var/cache/phpstan
          key: phpstan-${{ runner.os }}-${{ hashFiles('tools/phpstan/phpstan.neon') }}
          restore-keys: phpstan-${{ runner.os }}-

      - name: PHPStan
        run: make stan

      # —— Test database 🗄️ ——————————————————————————————————————————————————
      - name: Create test database (dbname_suffix _test applied automatically by Doctrine in test env)
        run: php bin/console doctrine:database:create --env=test --if-not-exists

      - name: Run migrations on test database
        run: php bin/console doctrine:migrations:migrate --env=test --no-interaction

      # —— Tests 🧪 —————————————————————————————————————————————————————————————
      - name: Run frontend tests
        run: make test-frontend

      - name: Run backend unit tests
        run: make test-backend-unit

      - name: Run backend integration tests
        run: make test-backend-integration
